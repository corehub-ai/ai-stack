name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: env dummy para interpolação (não sobe serviços)
        run: |
          cp deploy/compose/.env.example deploy/compose/.env
          sed -i 's/^BETTER_AUTH_SECRET=$/BETTER_AUTH_SECRET=ci-dummy/' deploy/compose/.env
          sed -i 's/^MANIFEST_ENCRYPTION_KEY=$/MANIFEST_ENCRYPTION_KEY=ci-dummy/' deploy/compose/.env
          sed -i 's/^POSTGRES_PASSWORD=$/POSTGRES_PASSWORD=ci-dummy/' deploy/compose/.env
      - run: docker compose -f deploy/compose/docker-compose.yml --env-file deploy/compose/.env --profile local-models config -q

  gateway-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test packages/gateway/test
      - run: bun test packages/cli/test
      - run: bun test packages/tier-classifier/test

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
