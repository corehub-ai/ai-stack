name: ia-stack

networks:
  default:
    name: ia-stack_net
    ipam:
      config:
        - subnet: 172.28.1.0/24

services:
  gateway:
    build:
      context: ../..
      dockerfile: packages/gateway/Dockerfile
    restart: unless-stopped
    ports:
      # host configuravel (GATEWAY_HOST_PORT) porque uma maquina pode ja ter
      # um Ollama nativo ocupando a 11434 (achado 2026-07-03 -- nao mexemos
      # em servico do host sem confirmar; ver .env local dessa maquina).
      # 11434 continua sendo o padrao documentado pra LAN sem esse conflito.
      - "0.0.0.0:${GATEWAY_HOST_PORT:-11434}:11434"
    environment:
      - GATEWAY_PORT=11434
      - HEADROOM_URL=http://headroom:8787
      - MANIFEST_URL=http://manifest:2099
      # NAO default pra 172.28.1.0/24 (a subnet da rede acima): achado
      # 2026-07-03 -- o docker-proxy (userland-proxy, ligado por padrao)
      # faz hairpin do trafego loopback do host pro gateway da bridge
      # (172.28.1.1), entao QUALQUER processo no host passaria pela CIDR
      # sem credencial. So loopback (127.0.0.1/::1) e confiavel por padrao;
      # trate GATEWAY_TRUSTED_CIDRS como opt-in ciente do risco.
      - GATEWAY_TRUSTED_CIDRS=${GATEWAY_TRUSTED_CIDRS:-}
      - GATEWAY_DEFAULT_KEY=${MANIFEST_KEY_LAN_ANON}
      - GATEWAY_CORS_ORIGINS=${GATEWAY_CORS_ORIGINS:-}
      # Identidade dedicada (harness) pro caller anônimo/confiável na façade
      # Ollama (/api/chat, /api/generate) -- separada da MANIFEST_KEY_LAN_ANON
      # usada por /v1/* (achado 2026-07-05, spec
      # 2026-07-05-ollama-facade-harness-design.md). Vazio até configurar:
      # cai no GATEWAY_DEFAULT_KEY acima (comportamento de hoje).
      - GATEWAY_OLLAMA_DEFAULT_KEY=${MANIFEST_KEY_OLLAMA_FACADE:-}
    depends_on:
      headroom:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:11434/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  openwebui:
    image: ghcr.io/open-webui/open-webui:0.6.18
    restart: unless-stopped
    profiles: [ui]
    ports:
      - "0.0.0.0:3000:8080"            # UI de chat na LAN (auth própria do Open WebUI)
    environment:
      # Conexão tipo OpenAI apontando pro gateway (spec §3: mais simples que a
      # conexão Ollama pra portar credencial). RAG interno usa embeddings
      # locais próprios do Open WebUI, sem tocar na cadeia.
      - OPENAI_API_BASE_URL=http://gateway:11434/v1
      - OPENAI_API_KEY=${MANIFEST_KEY_OPENWEBUI}
      - ENABLE_OLLAMA_API=false
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?defina no .env}
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      gateway:
        condition: service_healthy

  manifest:
    image: manifestdotbuild/manifest:6.13.3
    restart: unless-stopped
    ports:
      - "0.0.0.0:2099:2099"            # dashboard na LAN (auth própria: Better Auth)
    environment:
      # sem PORT/BIND_ADDRESS a imagem sobe em 0.0.0.0:3001 (default) -- nao bate
      # com o mapeamento de porta 2099 nem com o healthcheck (verificado 2026-07-03)
      - PORT=2099
      - BIND_ADDRESS=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=postgresql://manifest:${POSTGRES_PASSWORD}@postgres:5432/manifest
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?defina no .env}
      - BETTER_AUTH_URL=${MANIFEST_PUBLIC_URL:-http://localhost:2099}
      - MANIFEST_ENCRYPTION_KEY=${MANIFEST_ENCRYPTION_KEY:?defina no .env}
      - MANIFEST_MODE=selfhosted
      - MANIFEST_TELEMETRY_DISABLED=1
      - MANIFEST_DISABLE_HSTS=1
      # aponta pro tile Ollama interno (perfil local-models); nome de servico do compose,
      # NAO e host.docker.internal:11434 -- sem risco de loop com o gateway da F2 mesmo
      # que o servico ollama esteja parado (falha de DNS/conexao, nao um loop)
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # imagem distroless (sem curl): usar o node embarcado
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:2099/api/v1/health').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]

  tier-classifier:
    build:
      context: ../..
      dockerfile: packages/tier-classifier/Dockerfile
    restart: unless-stopped
    environment:
      - CLASSIFIER_PORT=8788
      - MANIFEST_URL=http://manifest:2099
      - CLASSIFIER_MANIFEST_KEY=${MANIFEST_KEY_TIER_CLASSIFIER}
      - CLASSIFIER_TIER=${CLASSIFIER_TIER:-default}
      - CLASSIFIER_TIMEOUT_MS=${CLASSIFIER_TIMEOUT_MS:-1500}
      - CLASSIFIER_COLD_LOAD_EXTRA_MS=${CLASSIFIER_COLD_LOAD_EXTRA_MS:-15000}
      # Remove temperature/top_p/top_k/thinking de todo request antes do
      # forward (o manifest é dono desses params por tier) -- evita o 400 da
      # Anthropic "temperature may only be set to 1 when thinking is enabled"
      # (achado 2026-07-05). "false" desliga.
      - CLASSIFIER_CANONICALIZE=${CLASSIFIER_CANONICALIZE:-true}
      # Harnesses (por CHAVE, não por nome -- o tier-classifier só vê a
      # credencial) cujas requests pulam a canonização. Default: a chave do
      # Claude-Gateway, porque o Claude Code manda thinking/params próprios que
      # quer preservar. Pra bypassar mais harnesses, edite pra lista separada
      # por vírgula: ${MANIFEST_KEY_CLAUDE_CODE},${MANIFEST_KEY_OUTRO}
      - CLASSIFIER_CANONICALIZE_BYPASS=${MANIFEST_KEY_CLAUDE_CODE:-}
    depends_on:
      manifest:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8788/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=manifest
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?defina no .env}
      - POSTGRES_DB=manifest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manifest -d manifest"]
      interval: 5s
      timeout: 3s
      retries: 20

  headroom:
    # 0.28.0 nao existe no ghcr.io; ultima tag numerada real e 0.27.0 == "latest"
    # (checado 2026-07-03 paginando /v2/.../tags/list ate o fim -- a primeira
    # checagem sem paginacao tinha parado em 0.6.7). Variante -code-nonroot
    # inclui a dependencia opcional tree-sitter (--code-aware, compressao
    # AST-aware de codigo) por cima da -nonroot; roda como usuario nonroot
    # igual (bate com o volume abaixo).
    image: ghcr.io/chopratejas/headroom:0.27.0-code-nonroot
    restart: unless-stopped
    command: ["--host", "0.0.0.0"]     # entrypoint da imagem e "headroom proxy"
    # F1 publicava 127.0.0.1:8787 (host-only). F2: gateway assume a frente --
    # headroom so alcancavel pela rede interna do compose.
    environment:
      - HEADROOM_HOST=0.0.0.0
      - OPENAI_TARGET_API_URL=http://tier-classifier:8788
      - ANTHROPIC_TARGET_API_URL=http://tier-classifier:8788
      - HEADROOM_TELEMETRY=off
      - HEADROOM_UPDATE_CHECK=off
    volumes:
      - headroom_workspace:/home/nonroot/.headroom
    depends_on:
      tier-classifier:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Provedor local sem credenciais externas — usado como "provedor real" da F1
  # (decisao 2026-07-03: sem chaves de API pagas disponiveis para automacao).
  # Nao publica porta no host: 11434 do host fica reservada para o gateway (F2).
  ollama:
    image: ollama/ollama:0.31.1
    restart: unless-stopped
    profiles: [local-models]
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Sem isso o default (~5min) descarrega o modelo da VRAM entre chamadas
      # espaçadas, forçando cold-load: a 1a tentativa de classificação do
      # tier-classifier sempre estoura CLASSIFIER_TIMEOUT_MS (1500ms) nesse
      # caso, e só o retry de cold-load resolve -- achado 2026-07-05 (logs
      # com -t mostrando o padrão 1a tentativa falha/2a tentativa ~1.44s
      # depois, correlacionado com `ollama ps` mostrando o modelo descarregado
      # antes da chamada). 30m mantém o qwen2.5:3b aquecido entre mensagens
      # normais de uma sessão de chat.
      - OLLAMA_KEEP_ALIVE=30m
    volumes:
      - ollama_data:/root/.ollama
    # Reserva a GPU nvidia pro container (achado 2026-07-04: o host tem RTX
    # 3060 + runtime nvidia registrado no Docker, mas o container rodava 100%
    # em CPU sem isso -- inferência local inaceitavelmente lenta pro timeout
    # do tier-classifier (CLASSIFIER_TIMEOUT_MS, 1500ms). Requer NVIDIA
    # Container Toolkit no host (já confirmado presente: `docker info` lista
    # "Runtimes: nvidia runc").
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # Sobe uma vez, roda "ollama pull" pros modelos abaixo no `ollama` acima e
  # sai (restart: "no") -- garante que eles ja vem baixados ao levantar o
  # stack, sem exigir um `docker exec ... ollama pull` manual depois (achado
  # 2026-07-03: a imagem oficial do ollama nao tem env var de auto-pull; este
  # e o padrao recomendado do ecossistema -- init container + depends_on
  # service_healthy). Idempotente: se o modelo ja existe no volume, o pull
  # retorna rapido sem rebaixar. qwen2.5:3b (2026-07-04) e o modelo do agente
  # tier-classifier no manifest -- escolhido apos testar 5 candidatos: fica
  # dentro do orcamento (CLASSIFIER_TIMEOUT_MS, 1500ms) aquecido e nunca sai
  # do vocabulario simple/complex/reasoning (qwen3.5:4b tem "thinking mode"
  # que o manifest nao repassa como texto -- content vazio sempre; ver
  # [[ia-stack-goal]]).
  ollama-pull:
    image: ollama/ollama:0.31.1
    restart: "no"
    profiles: [local-models]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["sh", "-c"]
    command:
      - |
        ollama pull codellama:latest
        ollama pull qwen2.5:3b
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  pgdata:
    name: ia-stack_pgdata
  headroom_workspace:
    name: ia-stack_headroom
  ollama_data:
    name: ia-stack_ollama
  openwebui_data:
    name: ia-stack_openwebui
