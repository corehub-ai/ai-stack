name: ia-stack

networks:
  default:
    name: ia-stack_net
    ipam:
      config:
        - subnet: 172.28.1.0/24

services:
  gateway:
    build:
      context: ../..
      dockerfile: packages/gateway/Dockerfile
    restart: unless-stopped
    ports:
      # host configuravel (GATEWAY_HOST_PORT) porque uma maquina pode ja ter
      # um Ollama nativo ocupando a 11434 (achado 2026-07-03 -- nao mexemos
      # em servico do host sem confirmar; ver .env local dessa maquina).
      # 11434 continua sendo o padrao documentado pra LAN sem esse conflito.
      - "0.0.0.0:${GATEWAY_HOST_PORT:-11434}:11434"
    environment:
      - GATEWAY_PORT=11434
      - HEADROOM_URL=http://headroom:8787
      - MANIFEST_URL=http://manifest:2099
      # NAO default pra 172.28.1.0/24 (a subnet da rede acima): achado
      # 2026-07-03 -- o docker-proxy (userland-proxy, ligado por padrao)
      # faz hairpin do trafego loopback do host pro gateway da bridge
      # (172.28.1.1), entao QUALQUER processo no host passaria pela CIDR
      # sem credencial. So loopback (127.0.0.1/::1) e confiavel por padrao;
      # trate GATEWAY_TRUSTED_CIDRS como opt-in ciente do risco.
      - GATEWAY_TRUSTED_CIDRS=${GATEWAY_TRUSTED_CIDRS:-}
      - GATEWAY_DEFAULT_KEY=${MANIFEST_KEY_LAN_ANON}
      - GATEWAY_CORS_ORIGINS=${GATEWAY_CORS_ORIGINS:-}
    depends_on:
      headroom:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:11434/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  openwebui:
    image: ghcr.io/open-webui/open-webui:0.6.18
    restart: unless-stopped
    profiles: [ui]
    ports:
      - "0.0.0.0:3000:8080"            # UI de chat na LAN (auth própria do Open WebUI)
    environment:
      # Conexão tipo OpenAI apontando pro gateway (spec §3: mais simples que a
      # conexão Ollama pra portar credencial). RAG interno usa embeddings
      # locais próprios do Open WebUI, sem tocar na cadeia.
      - OPENAI_API_BASE_URL=http://gateway:11434/v1
      - OPENAI_API_KEY=${MANIFEST_KEY_OPENWEBUI}
      - ENABLE_OLLAMA_API=false
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?defina no .env}
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      gateway:
        condition: service_healthy

  manifest:
    image: manifestdotbuild/manifest:6.12.0
    restart: unless-stopped
    ports:
      - "0.0.0.0:2099:2099"            # dashboard na LAN (auth própria: Better Auth)
    environment:
      # sem PORT/BIND_ADDRESS a imagem sobe em 0.0.0.0:3001 (default) -- nao bate
      # com o mapeamento de porta 2099 nem com o healthcheck (verificado 2026-07-03)
      - PORT=2099
      - BIND_ADDRESS=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=postgresql://manifest:${POSTGRES_PASSWORD}@postgres:5432/manifest
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?defina no .env}
      - BETTER_AUTH_URL=${MANIFEST_PUBLIC_URL:-http://localhost:2099}
      - MANIFEST_ENCRYPTION_KEY=${MANIFEST_ENCRYPTION_KEY:?defina no .env}
      - MANIFEST_MODE=selfhosted
      - MANIFEST_TELEMETRY_DISABLED=1
      - MANIFEST_DISABLE_HSTS=1
      # aponta pro tile Ollama interno (perfil local-models); nome de servico do compose,
      # NAO e host.docker.internal:11434 -- sem risco de loop com o gateway da F2 mesmo
      # que o servico ollama esteja parado (falha de DNS/conexao, nao um loop)
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # imagem distroless (sem curl): usar o node embarcado
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:2099/api/v1/health').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=manifest
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?defina no .env}
      - POSTGRES_DB=manifest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manifest -d manifest"]
      interval: 5s
      timeout: 3s
      retries: 20

  headroom:
    # 0.28.0 nao existe no ghcr.io; ultima tag numerada real e 0.27.0 == "latest"
    # (checado 2026-07-03 paginando /v2/.../tags/list ate o fim -- a primeira
    # checagem sem paginacao tinha parado em 0.6.7). Variante -code-nonroot
    # inclui a dependencia opcional tree-sitter (--code-aware, compressao
    # AST-aware de codigo) por cima da -nonroot; roda como usuario nonroot
    # igual (bate com o volume abaixo).
    image: ghcr.io/chopratejas/headroom:0.27.0-code-nonroot
    restart: unless-stopped
    command: ["--host", "0.0.0.0"]     # entrypoint da imagem e "headroom proxy"
    # F1 publicava 127.0.0.1:8787 (host-only). F2: gateway assume a frente --
    # headroom so alcancavel pela rede interna do compose.
    environment:
      - HEADROOM_HOST=0.0.0.0
      - OPENAI_TARGET_API_URL=http://manifest:2099
      - ANTHROPIC_TARGET_API_URL=http://manifest:2099
      - HEADROOM_TELEMETRY=off
      - HEADROOM_UPDATE_CHECK=off
    volumes:
      - headroom_workspace:/home/nonroot/.headroom
    depends_on:
      manifest:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Provedor local sem credenciais externas — usado como "provedor real" da F1
  # (decisao 2026-07-03: sem chaves de API pagas disponiveis para automacao).
  # Nao publica porta no host: 11434 do host fica reservada para o gateway (F2).
  ollama:
    image: ollama/ollama:0.31.1
    restart: unless-stopped
    profiles: [local-models]
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # Sobe uma vez, roda "ollama pull codellama:latest" no `ollama` acima e sai
  # (restart: "no") -- garante que esse modelo ja vem baixado ao levantar o
  # stack, sem exigir um `docker exec ... ollama pull` manual depois (achado
  # 2026-07-03: a imagem oficial do ollama nao tem env var de auto-pull; este
  # e o padrao recomendado do ecossistema -- init container + depends_on
  # service_healthy). Idempotente: se o modelo ja existe no volume, o pull
  # retorna rapido sem rebaixar.
  ollama-pull:
    image: ollama/ollama:0.31.1
    restart: "no"
    profiles: [local-models]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: ["pull", "codellama:latest"]
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  pgdata:
    name: ia-stack_pgdata
  headroom_workspace:
    name: ia-stack_headroom
  ollama_data:
    name: ia-stack_ollama
  openwebui_data:
    name: ia-stack_openwebui
